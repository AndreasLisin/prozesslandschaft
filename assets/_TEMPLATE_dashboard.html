<!DOCTYPE html>
<!--
  STARTER-VORLAGE fuer ein eigenes Dashboard/Tool.
  1) Diese Datei in den Ordner deines Prozesses kopieren (z.B. eol/mein_tool.html)
     und umbenennen. (Ordner ggf. neu anlegen - Ordnername = slug des Prozesses.)
  2) In struktur.js beim passenden Prozess unter "tiles" verlinken, z.B.:
        { name: "Mein Tool", url: "eol/mein_tool.html", beschreibung: "..." }
  3) Unten deinen Inhalt einbauen. Design/Kopf kommen automatisch aus ../assets/style.css.
-->
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<header>
  <div class="logo-wrap">
    <div class="logo-text">EINHAUS.</div>
    <div class="logo-sub-row">
      <div class="logo-stripes"><span class="s1"></span><span class="s2"></span><span class="s3"></span><span class="s4"></span><span class="s5"></span><span class="s6"></span><span class="s7"></span></div>
      <div class="logo-tagline">Oberfl&auml;chenveredelung auf h&ouml;chstem Niveau.</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <div class="header-info">
    <div class="header-title">Mein Tool</div>
    <div class="header-subtitle">Prozess &middot; <span id="headerDatum"></span></div>
  </div>
  <div class="header-right">
    <a class="btn-back" href="../index.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> Prozesslandschaft</a>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()"><span class="icon">&#127769;</span> Dunkel</button>
  </div>
</header>
<main>
  <div class="section-title">Mein Bereich</div>
  <p style="line-height:1.6">Hier kommt der Inhalt deines Dashboards hin.</p>
</main>
<footer>EINHAUS Oberfl&auml;chenveredelung GmbH &nbsp;&middot;&nbsp; Saarlandstr. 375a, 55411 Bingen</footer>
</body>
</html>
